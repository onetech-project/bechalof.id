<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Bechalof CMS</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>body{font-family:Inter,system-ui,Arial;padding:24px;background:#fff}</style>
  </head>
  <body>
    <!-- Netlify Identity Widget (handles invite acceptance & auth) -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <script>
      // Initialize Netlify Identity early (before loading Netlify CMS)
      (function(){
        try {
          if (window.netlifyIdentity) {
            // Explicit API URL helps in some deploy setups
            var apiUrl = window.location.origin + '/.netlify/identity';
            window.netlifyIdentity.init({ APIUrl: apiUrl });

            // If an invite token is present in the URL, open the signup flow
            const params = new URLSearchParams(window.location.search);
            if (params.has('invitation') || params.has('invite_token') || params.has('token')) {
              window.netlifyIdentity.open('signup');
            }

            // On successful login, reload /admin so Netlify CMS picks up the session
            window.netlifyIdentity.on('login', function() {
              window.netlifyIdentity.close();
              // small delay to ensure token is persisted
              setTimeout(function(){
                window.location.replace('/admin/');
              }, 200);
            });

            // On logout, redirect to admin so user sees login prompt again
            window.netlifyIdentity.on('logout', function() {
              window.location.replace('/admin/');
            });
          }
        } catch (e) {
          console.error('Identity init error', e);
        }
      })();
    </script>

    <!-- Load Netlify CMS after Identity is initialized -->
    <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>

    <p>If you were invited, the signup modal should open automatically. If not, click Login and choose Netlify to sign in.</p>
  </body>
</html>
